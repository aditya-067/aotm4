<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arena Animation</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
    }

    /*================ BANNER SECTION ================*/

    .banner{
      width: 100%;
      height: 80vh;

      background-image: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)),
      url("img/6.gif");

      background-size: cover;
      background-position: center;

      animation: slider 15s infinite;
    }

    /*================ NAVBAR ================*/

    #header{
      width: 100%;
      height: 100px;

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 0 60px;

      background: rgba(255,255,255,.1);
      backdrop-filter: blur(8px);
    }

    .logo{
      color: white;
      font-size: 32px;
      font-weight: bold;
    }

    #nav{
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    #nav li a{
      text-decoration: none;
      color: white;
      font-size: 18px;
      font-weight: bold;
      transition: .3s;
    }

    #nav li a:hover{
      color: yellow;
    }

    /*================ TEXT ================*/

    .content{
      height: calc(100vh - 250px);

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      color: white;
      text-align: center;
    }

    .content h1{
      font-size: 70px;
      margin-bottom: 20px;
    }

    .content p{
      font-size: 20px;
      width: 70%;
      line-height: 30px;
    }

    .btn{
      margin-top: 30px;
      padding: 14px 35px;
      border: none;
      background: yellow;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
      transition: .3s;
    }

    .btn:hover{
      background: white;
    }

    /*================ SLIDER ANIMATION ================*/

    @keyframes slider{

      0%{
        background-image: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)),
        url("img/2.gif");
      }

      33%{
        background-image: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)),
        url("img/3.gif");
      }

      66%{
        background-image: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)),
        url("img/4.gif");
      }

      100%{
        background-image: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)),
        url("img/5.gif");
      }

    }

    /*================ MOBILE ================*/

    @media screen and (max-width: 768px){

      #header{
        flex-direction: column;
        height: auto;
        padding: 20px;
        gap: 20px;
      }

      #nav{
        flex-wrap: wrap;
        justify-content: center;
      }

      .content h1{
        font-size: 45px;
      }

      .content p{
        width: 90%;
        font-size: 16px;
      }

    }

  </style>
</head>

<body>

  <div class="banner">

    <div id="header">

      <div class="logo">
        Arena
      </div>

      <ul id="nav">
        <li><a href="#">Home</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Courses</a></li>
        <li><a href="#">Contact Us</a></li>
      </ul>

    </div>

    <div class="content">
      <h1>Creative Animation Institute</h1>

      <p>
        Learn Web Design, Animation, VFX, Graphic Design and Programming
        with modern technology and creative projects.
      </p>

      <button class="btn">Explore Courses</button>
    </div>

  </div>

</body>
</html>
